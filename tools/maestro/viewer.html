<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro Run Viewer</title>
<link rel="stylesheet" href="viewer.css">
</head>
<body>

<!-- ═══ Drop Zone ═══════════════════════════════════════════════════ -->
<div id="drop-zone" role="main" aria-label="File loading area">
  <div class="drop-area" id="drop-area" role="button" tabindex="0" aria-label="Drop a JSON file here or click to browse">
    <h2>Maestro Run Viewer</h2>
    <p>Drop a <code>.state.json</code>, <code>ExecutableScore</code>, or <code>SavedRun</code> file here, or click to browse</p>
    <input type="file" id="file-input" accept=".json" aria-label="Select JSON file">
  </div>
  <span class="or-divider">or paste JSON</span>
  <div class="paste-area">
    <textarea id="paste-input" placeholder='Paste JSON here…' aria-label="Paste JSON"></textarea>
    <button class="btn btn-primary" id="paste-btn">Load JSON</button>
  </div>
</div>

<!-- ═══ Viewer ══════════════════════════════════════════════════════ -->
<div id="viewer" role="main" aria-label="Run viewer">

  <!-- Header Bar -->
  <header class="header-bar" role="banner">
    <button class="btn back-btn" id="back-btn" aria-label="Go back to file loader">←</button>
    <span class="status-badge" id="status-badge" aria-live="polite"></span>
    <div class="header-info">
      <div class="pattern-name" id="header-pattern"></div>
      <div class="prompt-text" id="header-prompt" role="button" tabindex="0" aria-label="Click to expand prompt"></div>
    </div>
    <div class="header-timing" id="header-timing"></div>
    <div class="header-actions">
      <div class="toggle-wrap">
        <span>Watch</span>
        <label class="toggle" aria-label="Toggle auto-refresh">
          <input type="checkbox" id="watch-toggle">
          <span class="toggle-track"></span>
        </label>
      </div>
      <button class="btn btn-sm" id="export-btn" aria-label="Copy data summary to clipboard">Export</button>
    </div>
  </header>

  <!-- Phase Stepper -->
  <nav class="phase-stepper" id="phase-stepper" aria-label="Run phase progress"></nav>

  <!-- Main Content -->
  <div class="main-content">
    <section class="left-panel" id="left-panel" aria-label="Beat sequence"></section>
    <aside class="right-panel" id="right-panel" aria-label="Details panel"></aside>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="alert" aria-live="polite"></div>

<script src="viewer.js"></script>
</body>
</html>
